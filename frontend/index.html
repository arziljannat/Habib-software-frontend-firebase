<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login – Rasson Snooker Academy</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1 class="login-title">Rasson Snooker Academy</h1>

        <input type="text" id="branchCode" class="login-input" placeholder="Enter Branch Code">

        <input type="text" id="loginUserId" class="login-input" placeholder="Enter User ID">

        <input type="password" id="loginPassword" class="login-input" placeholder="Enter Password">

        <button class="login-btn" onclick="login()">Login</button>


        <p id="errorMsg" class="error-text"></p>

    </div>

</div>

<script src="login2.js"></script>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE_YOUR_KEY",
  authDomain: "PASTE_YOUR_DOMAIN",
  projectId: "PASTE_YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("Firebase Connected ✅");
</script>
    
</body>
</html>
